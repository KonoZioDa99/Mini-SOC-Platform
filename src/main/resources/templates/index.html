<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Accueil - MiniSOC</title>
    <script>
        function updateStats() {
            fetch('/api/stats')
                .then(response => response.json())
                .then(data => {
                    document.getElementById('logCount').textContent = data.logCount;
                    document.getElementById('incidentCount').textContent = data.incidentCount;
                });
        }

        setInterval(updateStats, 3000); // Met à jour toutes les 3 secondes
        window.onload = updateStats; // Met à jour dès le chargement
    </script>

    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f6f9;
        }

        header {
            background-color: #1f4e79;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: bold;
        }

        .container {
            padding: 2rem;
        }

        .card {
            background-color: white;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .card h2 {
            margin-top: 0;
            color: #1f4e79;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            font-size: 0.9rem;
            color: #777;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }

        button {
            background-color: #1f4e79;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #163a5a;
        }

        button:disabled {
            background-color: #a0a0a0;
            cursor: not-allowed;
        }
    </style>
</head>
<body>

<header>
    <h1>
        <a th:href="@{/index}" style="color: white; text-decoration: none;">
            <span style="color: white;">MiniSOC</span>
        </a>
    </h1>
    <nav>
        <a th:href="@{/dashboard/alerts}">Alertes</a>
        <a th:href="@{/dashboard/logs}">Logs</a>
    </nav>
</header>


<div class="container">

    <div class="card">
        <h2>Bienvenue, <span th:text="${#authentication.name}">Utilisateur</span> !</h2>
        <p>Ceci est le tableau de bord principal de la plateforme MiniSOC.</p>
    </div>

    <div class="button-group">
        <form method="post" th:action="@{/start}">
            <button type="submit" th:disabled="${isRunning}">▶ Démarrer les logs</button>
        </form>

        <form method="post" th:action="@{/stop}">
            <button type="submit" th:disabled="${!isRunning}">■ Arrêter les logs</button>
        </form>

        <form method="post" th:action="@{/generate-alerts}">
            <button type="submit">⚠ Générer les alertes</button>
        </form>
    </div>

    <div class="card">
        <h2>État du Système</h2>
        <ul>
            <li>Nombre d'incidents détectés aujourd'hui : <strong id="incidentCount" th:text="${incidentCount}">0</strong></li>
            <li>Logs collectés : <strong id="logCount" th:text="${logCount}">0</strong></li>
        </ul>
    </div>

    <div class="footer">
        &copy; 2025 MiniSOC - Projet de simulation de SOC en Java JEE.
    </div>

</body>
</html>
