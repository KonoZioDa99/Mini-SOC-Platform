<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f3f6f9;
        }

        header {
            background-color: #1f4e79;
            color: white;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 1.5rem;
            font-weight: bold;
        }

        .footer {
            text-align: center;
            margin-top: 3rem;
            padding: 1rem;
            font-size: 0.9rem;
            color: #777;
        }
    </style>
</head>
<body>
<!-- HEADER FRAGMENT -->
<div th:fragment="header">
    <header>
        <h1>MiniSOC </h1>
        <nav>
            <a th:href="@{/}">Accueil</a>
            <a th:href="@{/dashboard/alerts}">Alertes</a>
            <a th:href="@{/dashboard/logs}">Logs</a>
        </nav>
    </header>
</div>

<!-- FOOTER FRAGMENT -->
<div th:fragment="footer">
    <div class="footer">
        &copy; 2025 MiniSOC - Projet de simulation de SOC en Java JEE.
    </div>
</div>
</body>
</html>
